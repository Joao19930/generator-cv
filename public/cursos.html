<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cursos Online em Angola — CV Premium</title>
<meta name="description" content="Encontra os melhores cursos online em Angola para impulsionar a tua carreira. Tecnologia, gestão, finanças, saúde e muito mais.">
<link rel="canonical" href="https://cvpremium.net/cursos">
<meta property="og:title" content="Cursos Online em Angola — CV Premium">
<meta property="og:description" content="Os melhores cursos para impulsionar a tua carreira em Angola.">
<meta property="og:image" content="https://cvpremium.net/og-image.png">
<meta property="og:url" content="https://cvpremium.net/cursos">
<meta name="robots" content="index,follow">
<script type="application/ld+json">{"@context":"https://schema.org","@type":"ItemList","name":"Cursos Online — CV Premium Angola","description":"Lista de cursos online para desenvolvimento de carreira em Angola","url":"https://cvpremium.net/cursos"}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#6366f1;--primary-d:#4f46e5;--primary-l:#eef2ff;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#0f172a;--t2:#334155;--t3:#64748b;--t4:#94a3b8;--green:#10b981;--amber:#f59e0b;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.topbar-logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;color:var(--text);text-decoration:none;}
.topbar-logo-dot{width:8px;height:8px;background:var(--primary);border-radius:50%;}
.topbar-sep{flex:1;}
.topbar-btn{background:var(--primary);color:#fff;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;}
.topbar-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--t3);text-decoration:none;padding:6px 12px;border-radius:8px;transition:background .15s;}
.topbar-back:hover{background:var(--bg);color:var(--primary);}
.hero{background:linear-gradient(135deg,#7c3aed 0%,#6366f1 100%);padding:52px 24px 40px;text-align:center;color:#fff;}
.hero h1{font-size:clamp(22px,4vw,34px);font-weight:800;margin-bottom:10px;}
.hero p{font-size:15px;opacity:.85;margin-bottom:24px;}
.hero-stats{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
.hero-stat{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);padding:7px 18px;border-radius:20px;font-size:13px;font-weight:600;}
.search-wrap{max-width:860px;margin:-22px auto 0;padding:0 16px;position:relative;z-index:10;}
.search-box{background:#fff;border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,.12);padding:14px 18px;display:flex;gap:10px;flex-wrap:wrap;}
.search-field{flex:1;min-width:160px;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0 12px;}
.search-field svg{flex-shrink:0;color:var(--t4);}
.search-field input{border:none;background:none;outline:none;font-family:'Sora',sans-serif;font-size:13px;color:var(--text);width:100%;padding:10px 0;}
.search-field input::placeholder{color:var(--t4);}
.search-field select{border:none;background:none;outline:none;font-family:'Sora',sans-serif;font-size:13px;color:var(--text);width:100%;padding:10px 0;cursor:pointer;}
.search-btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.main{max-width:860px;margin:0 auto;padding:36px 16px 60px;}
.results-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.results-count{font-size:14px;color:var(--t3);}
.results-count strong{color:var(--text);}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
.c-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:10px;transition:box-shadow .18s,border-color .18s;}
.c-card:hover{box-shadow:0 4px 20px rgba(99,102,241,.13);border-color:var(--primary);}
.c-cat{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--primary-l);color:var(--primary);width:fit-content;}
.c-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.4;}
.c-source{font-size:12px;color:var(--t3);}
.c-stars{display:flex;gap:2px;}
.c-star{color:var(--amber);font-size:13px;}
.c-rating{font-size:11px;color:var(--t3);}
.c-actions{margin-top:auto;padding-top:6px;}
.c-btn{display:inline-flex;align-items:center;gap:6px;background:var(--primary);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;transition:background .15s;}
.c-btn:hover{background:var(--primary-d);}
.c-btn-ghost{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);color:var(--t2);padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;}
.empty{text-align:center;padding:60px 24px;color:var(--t4);}
.empty svg{margin-bottom:14px;opacity:.3;}
.skeleton{background:linear-gradient(90deg,#f0f4f8 25%,#e2e8f0 50%,#f0f4f8 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(max-width:600px){.hero{padding:36px 16px 32px;}.topbar{padding:0 12px;}}
</style>
</head>
<body>
<nav class="topbar">
  <a class="topbar-logo" href="/"><div class="topbar-logo-dot"></div>CV Premium</a>
  <div class="topbar-sep"></div>
  <a class="topbar-back" href="/app">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Painel
  </a>
  <a class="topbar-btn" href="/editor">Criar CV</a>
</nav>

<section class="hero">
  <h1>Cursos para Impulsionar a sua Carreira</h1>
  <p>Os melhores cursos online seleccionados para o mercado angolano.</p>
  <div class="hero-stats">
    <span class="hero-stat" id="heroTotal">A carregar…</span>
    <span class="hero-stat">Diversas plataformas</span>
    <span class="hero-stat">Certificados reconhecidos</span>
  </div>
</section>

<div class="search-wrap">
  <div class="search-box">
    <div class="search-field" style="flex:2;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="inpSearch" type="text" placeholder="Pesquisar curso…" oninput="filter()">
    </div>
    <div class="search-field">
      <select id="inpCat" onchange="filter()">
        <option value="">Todas as categorias</option>
        <option>TI & Informática</option>
        <option>Gestão & Negócios</option>
        <option>Finanças</option>
        <option>Marketing</option>
        <option>Design</option>
        <option>Saúde</option>
        <option>Educação</option>
        <option>Oil & Gás</option>
        <option>Cibersegurança</option>
        <option>Outro</option>
      </select>
    </div>
  </div>
</div>

<main class="main">
  <div class="results-hdr"><div class="results-count" id="resultsCount">&nbsp;</div></div>
  <div class="courses-grid" id="coursesList">
    <div style="height:160px;border-radius:14px;" class="skeleton"></div>
    <div style="height:160px;border-radius:14px;" class="skeleton"></div>
    <div style="height:160px;border-radius:14px;" class="skeleton"></div>
    <div style="height:160px;border-radius:14px;" class="skeleton"></div>
    <div style="height:160px;border-radius:14px;" class="skeleton"></div>
    <div style="height:160px;border-radius:14px;" class="skeleton"></div>
  </div>
</main>

<script>
let allCourses = [];

function stars(r){
  const n = parseFloat(r)||0;
  return Array.from({length:5},(_,i)=>`<span class="c-star">${i<Math.round(n)?'★':'☆'}</span>`).join('');
}

function renderCard(c, i){
  const title  = c.Title||c.title||'Curso';
  const source = c.Source||c.source||'';
  const cat    = c.Category||c.category||'';
  const rating = c.Rating||c.rating||'';
  const url    = c.Url||c.url||'';
  const id     = c.Id||c.id||'';
  return `<div class="c-card" style="animation:fadeIn .3s ease ${i*.04}s both;">
    ${cat?`<span class="c-cat">${cat}</span>`:''}
    <div class="c-title">${title}</div>
    ${source?`<div class="c-source">${source}</div>`:''}
    ${rating?`<div style="display:flex;align-items:center;gap:6px;">${stars(rating)}<span class="c-rating">${rating}/5</span></div>`:''}
    <div class="c-actions">
      ${url?`<a href="/cursos/${id}" class="c-btn">Ver curso →</a>`:`<span class="c-btn-ghost">Em breve</span>`}
    </div>
  </div>`;
}

function filter(){
  const q   = document.getElementById('inpSearch').value.toLowerCase();
  const cat = document.getElementById('inpCat').value;
  const list = allCourses.filter(c=>{
    const title = (c.Title||c.title||'').toLowerCase();
    const src   = (c.Source||c.source||'').toLowerCase();
    const c2    = c.Category||c.category||'';
    return (!q||(title+src).includes(q)) && (!cat||c2===cat);
  });
  document.getElementById('resultsCount').innerHTML = `<strong>${list.length}</strong> cursos encontrados`;
  document.getElementById('coursesList').innerHTML = list.length
    ? list.map((c,i)=>renderCard(c,i)).join('')
    : `<div class="empty" style="grid-column:1/-1;"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><p>Nenhum curso encontrado.</p></div>`;
}

async function load(){
  try{
    const r = await fetch('/api/content/courses');
    allCourses = await r.json();
    document.getElementById('heroTotal').textContent = allCourses.length + ' cursos disponíveis';
    filter();
  }catch(e){
    document.getElementById('coursesList').innerHTML='<div class="empty" style="grid-column:1/-1;">Erro ao carregar cursos.</div>';
  }
}
load();
</script>
</body>
</html>
