<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mentores de Carreira em Angola — CV Premium</title>
<meta name="description" content="Encontra mentores e coaches de carreira em Angola. Especialistas em RH, tecnologia, finanças e gestão prontos para te orientar.">
<link rel="canonical" href="https://cvpremium.net/mentores">
<meta property="og:title" content="Mentores de Carreira em Angola — CV Premium">
<meta property="og:description" content="Conecta-te com mentores e coaches de carreira em Angola.">
<meta property="og:image" content="https://cvpremium.net/og-image.png">
<meta property="og:url" content="https://cvpremium.net/mentores">
<meta name="robots" content="index,follow">
<script type="application/ld+json">{"@context":"https://schema.org","@type":"ItemList","name":"Mentores de Carreira — CV Premium Angola","description":"Lista de mentores e coaches de carreira disponíveis em Angola","url":"https://cvpremium.net/mentores"}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#6366f1;--primary-d:#4f46e5;--primary-l:#eef2ff;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#0f172a;--t2:#334155;--t3:#64748b;--t4:#94a3b8;--radius:14px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.topbar-logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;color:var(--text);text-decoration:none;}
.topbar-logo-dot{width:8px;height:8px;background:var(--primary);border-radius:50%;}
.topbar-sep{flex:1;}
.topbar-btn{background:var(--primary);color:#fff;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;}
.topbar-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--t3);text-decoration:none;padding:6px 12px;border-radius:8px;transition:background .15s;}
.topbar-back:hover{background:var(--bg);color:var(--primary);}
.hero{background:linear-gradient(135deg,#0d9488 0%,#6366f1 100%);padding:52px 24px 40px;text-align:center;color:#fff;}
.hero h1{font-size:clamp(22px,4vw,34px);font-weight:800;margin-bottom:10px;}
.hero p{font-size:15px;opacity:.85;margin-bottom:24px;}
.hero-stats{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
.hero-stat{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);padding:7px 18px;border-radius:20px;font-size:13px;font-weight:600;}
.search-wrap{max-width:860px;margin:-22px auto 0;padding:0 16px;position:relative;z-index:10;}
.search-box{background:#fff;border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,.12);padding:14px 18px;display:flex;gap:10px;flex-wrap:wrap;}
.search-field{flex:1;min-width:160px;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0 12px;}
.search-field svg{flex-shrink:0;color:var(--t4);}
.search-field input{border:none;background:none;outline:none;font-family:'Sora',sans-serif;font-size:13px;color:var(--text);width:100%;padding:10px 0;}
.search-field input::placeholder{color:var(--t4);}
.main{max-width:860px;margin:0 auto;padding:36px 16px 60px;}
.results-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.results-count{font-size:14px;color:var(--t3);}
.results-count strong{color:var(--text);}
.mentors-list{display:flex;flex-direction:column;gap:16px;}
.m-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;display:flex;gap:18px;align-items:flex-start;transition:box-shadow .18s,border-color .18s;}
.m-card:hover{box-shadow:0 4px 20px rgba(99,102,241,.13);border-color:var(--primary);}
.m-av{width:56px;height:56px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;overflow:hidden;}
.m-av img{width:100%;height:100%;object-fit:cover;}
.m-body{flex:1;min-width:0;}
.m-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px;}
.m-loc{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:4px;margin-bottom:8px;}
.m-bio{font-size:13px;color:var(--t3);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;}
.m-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.m-tag{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--primary-l);color:var(--primary);}
.m-btn{display:inline-flex;align-items:center;gap:6px;background:var(--primary);color:#fff;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;transition:background .15s;}
.m-btn:hover{background:var(--primary-d);}
.m-btn-ghost{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);color:var(--t2);padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;}
.empty{text-align:center;padding:60px 24px;color:var(--t4);}
.skeleton{background:linear-gradient(90deg,#f0f4f8 25%,#e2e8f0 50%,#f0f4f8 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(max-width:600px){.m-card{flex-direction:column;}.hero{padding:36px 16px 32px;}.topbar{padding:0 12px;}}
</style>
</head>
<body>
<nav class="topbar">
  <a class="topbar-logo" href="/"><div class="topbar-logo-dot"></div>CV Premium</a>
  <div class="topbar-sep"></div>
  <a class="topbar-back" href="/app">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Painel
  </a>
  <a class="topbar-btn" href="/editor">Criar CV</a>
</nav>

<section class="hero">
  <h1>Mentores de Carreira em Angola</h1>
  <p>Especialistas prontos para te orientar no desenvolvimento profissional.</p>
  <div class="hero-stats">
    <span class="hero-stat" id="heroTotal">A carregar…</span>
    <span class="hero-stat">Mentoria personalizada</span>
    <span class="hero-stat">Vários sectores</span>
  </div>
</section>

<div class="search-wrap">
  <div class="search-box">
    <div class="search-field">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="inpSearch" type="text" placeholder="Pesquisar mentor, área…" oninput="filter()">
    </div>
  </div>
</div>

<main class="main">
  <div class="results-hdr"><div class="results-count" id="resultsCount">&nbsp;</div></div>
  <div class="mentors-list" id="mentorsList">
    <div style="height:130px;border-radius:14px;" class="skeleton"></div>
    <div style="height:130px;border-radius:14px;" class="skeleton"></div>
    <div style="height:130px;border-radius:14px;" class="skeleton"></div>
  </div>
</main>

<script>
let allMentors = [];

const COLORS = ['#6366f1','#8b5cf6','#ec4899','#06b6d4','#10b981','#f59e0b','#ef4444'];

function renderCard(c, i){
  const id     = c.Id||c.id;
  const name   = c.Name||c.name||'Mentor';
  const loc    = c.Location||c.location||'Angola';
  const bio    = c.Bio||c.bio||'';
  const skills = (c.Skills||c.skills||'').split(',').map(s=>s.trim()).filter(Boolean).slice(0,5);
  const email  = c.Email||c.email||'';
  const photo  = c.PhotoUrl||c.photo_url||'';
  const color  = c.Color||c.color||COLORS[i%COLORS.length];
  const init   = name[0].toUpperCase();

  const avatar = photo
    ? `<img src="${photo}" alt="${name}" onerror="this.style.display='none';this.parentElement.textContent='${init}'">`
    : init;

  return `<div class="m-card" style="animation:fadeIn .3s ease ${i*.05}s both;">
    <div class="m-av" style="background:${color};">${avatar}</div>
    <div class="m-body">
      <div class="m-name">${name}</div>
      <div class="m-loc">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${loc}
      </div>
      ${bio?`<div class="m-bio">${bio}</div>`:''}
      ${skills.length?`<div class="m-tags">${skills.map(s=>`<span class="m-tag">${s}</span>`).join('')}</div>`:''}
      <a href="/mentores/${id}" class="m-btn">Ver perfil →</a>
    </div>
  </div>`;
}

function filter(){
  const q = document.getElementById('inpSearch').value.toLowerCase();
  const list = allMentors.filter(c=>{
    const txt = [(c.Name||c.name||''),(c.Skills||c.skills||''),(c.Location||c.location||'')].join(' ').toLowerCase();
    return !q||txt.includes(q);
  });
  document.getElementById('resultsCount').innerHTML = `<strong>${list.length}</strong> mentores encontrados`;
  document.getElementById('mentorsList').innerHTML = list.length
    ? list.map((c,i)=>renderCard(c,i)).join('')
    : `<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>Nenhum mentor encontrado.</p></div>`;
}

async function load(){
  try{
    const r = await fetch('/api/content/coaches');
    allMentors = await r.json();
    document.getElementById('heroTotal').textContent = allMentors.length + ' mentores disponíveis';
    filter();
  }catch(e){
    document.getElementById('mentorsList').innerHTML='<div class="empty">Erro ao carregar mentores.</div>';
  }
}
load();
</script>
</body>
</html>
